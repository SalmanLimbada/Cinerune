<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse | Cinerune</title>
    <meta name="description" content="Cinerune filtered browse page" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" href="./favicon.svg?v=20260430" type="image/svg+xml" sizes="any">
    <link rel="stylesheet" href="styles.css?v=20260502-ui1" />
  </head>
  <body class="home-body">
    <div class="home-atmosphere" aria-hidden="true"></div>

    <header class="home-topbar">
      <a class="home-logo" href="./index.html" aria-label="Go to home"><span>CINE</span>RUNE</a>
      <form class="nav-search" action="./search.html" method="GET">
        <button type="submit" class="nav-search-btn" aria-label="Search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
        <input type="search" class="nav-search-input" name="q" placeholder="Search..." autocomplete="off" maxlength="80" />
      </form>
      <nav class="home-nav" aria-label="Browse navigation">
        <a class="chip chip-link" href="./browse.html?mode=genre">Genre</a>
        <a class="chip chip-link" href="./browse.html?mode=country">Countries</a>
        <a class="chip chip-link" href="./top-rated.html?type=movie">Top Rated</a>
      </nav>
      <div id="notificationsWrap" class="account-menu-wrap" hidden>
        <button id="notificationsBtn" class="icon-pill" type="button" aria-label="Notifications" aria-expanded="false">
          <span class="notif-icon" aria-hidden="true">&#128276;</span>
          <span id="notificationsBadge" class="notif-badge" hidden>0</span>
        </button>
        <div id="notificationsMenu" class="account-menu notifications-menu" hidden>
          <div class="notifications-head">
            <div class="notifications-head-left">
              <strong>Notifications</strong>
              <a class="mini-action-btn" href="./inbox.html">Inbox</a>
              <button id="notificationsMarkAll" class="mini-action-btn" type="button">Read all</button>
            </div>
          </div>
          <div id="notificationsList" class="notifications-list"></div>
        </div>
      </div>
      <div id="accountMenuWrap" class="account-menu-wrap">
        <button id="toggleAuth" class="pill-btn account-pill" type="button">
          <img id="authAvatarThumb" class="nav-avatar" alt="Selected avatar" />
          <span id="authButtonLabel">Login</span>
        </button>
        <div id="accountMenu" class="account-menu" hidden>
          <a class="account-menu-item" href="./index.html?modal=settings">
            <span class="menu-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 6h16"/><circle cx="9" cy="6" r="2"/><path d="M4 12h16"/><circle cx="15" cy="12" r="2"/><path d="M4 18h16"/><circle cx="8" cy="18" r="2"/></svg>
            </span>
            <span>Settings</span>
          </a>
          <a class="account-menu-item" href="./inbox.html">
            <span class="menu-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 6h16v12H4z"/><path d="M4 7l8 6 8-6"/></svg>
            </span>
            <span>Inbox</span>
          </a>
          <a class="account-menu-item" href="./lists.html">
            <span class="menu-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M6 4h12v16l-6-4-6 4z"/></svg>
            </span>
            <span>Bookmarks</span>
          </a>
          <a class="account-menu-item" href="./lists.html?view=continue">
            <span class="menu-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M8 5l11 7-11 7z"/></svg>
            </span>
            <span>Continue Watching</span>
          </a>
          <button id="signOutMenuBtn" class="account-menu-item destructive" type="button">
            <span class="menu-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M10 5v14"/><path d="M16 12H4"/><path d="M16 12l-4-4"/><path d="M16 12l-4 4"/></svg>
            </span>
            <span>Sign Out</span>
          </button>
        </div>
      </div>
    </header>

    <main class="home-shell">
      <section class="home-row">
        <div class="row-head toggle-row">
          <h2 id="browseTitle">Browse</h2>
          <div id="browseTypeToggle" class="segmented-toggle" hidden>
            <button id="browseMoviesLink" class="segmented-btn" type="button" data-type="movie">Movies</button>
            <button id="browseTvLink" class="segmented-btn" type="button" data-type="tv">TV Series</button>
          </div>
        </div>
      </section>

      <section id="browseOptionsSection" class="home-row">
        <div class="row-head compact">
          <h3>Select</h3>
        </div>
        <div id="browseOptionsGrid" class="mega-menu-grid"></div>
      </section>

      <section id="browseMoviesSection" class="home-row">
        <div class="row-head compact"><h3>Movies</h3></div>
        <div id="browseMoviesGrid" class="poster-grid"></div>
      </section>

      <section id="browseTvSection" class="home-row">
        <div class="row-head compact"><h3>TV Series</h3></div>
        <div id="browseTvGrid" class="poster-grid"></div>
      </section>

      <section class="home-row">
        <div id="browsePagination" class="pager" hidden></div>
      </section>
    </main>

    <template id="posterCardTemplate">
      <article class="poster-card">
        <a class="poster-btn" href="">
          <img class="poster-img" alt="" loading="lazy" decoding="async" />
          <span class="badge-hd">HD</span>
          <div class="poster-meta">
            <h4 class="poster-title"></h4>
            <p class="poster-sub"></p>
          </div>
        </a>
      </article>
    </template>

    <footer class="site-notice">
      This site does not host any files on its own servers. It indexes and links to media hosted by third-party services.
    </footer>

    <script src="config.js"></script>
    <script>
      (function () {
        const isLocalHost = /^(localhost|127\.0\.0\.1|0\.0\.0\.0|\[::1\])$/i.test(location.hostname) || location.hostname.endsWith(".local");
        if (!isLocalHost) {
          return;
        }
        const script = document.createElement("script");
        script.src = "config.local.js";
        script.async = false;
        document.head.appendChild(script);
      })();
    </script>
    <script type="module" src="browse.js?v=20260502-ui1"></script>
  </body>
</html>
