<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinerune</title>
    <meta name="description" content="Cinerune streaming home" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="home-body">
    <div class="home-atmosphere" aria-hidden="true"></div>

    <header class="home-topbar">
      <a class="home-logo" href="./index.html" aria-label="Go to home"><span>CINE</span>RUNE</a>

      <nav class="home-nav" aria-label="Main navigation">
        <button id="showGenreExplorer" class="chip" type="button">Genre</button>
        <button id="showCountryExplorer" class="chip" type="button">Countries</button>
        <a class="chip chip-link" href="./top-rated.html?type=movie">Top Rated</a>
      </nav>

      <div class="header-actions">
        <a id="homeListsLink" class="pill-btn ghost" href="./lists.html" hidden>My Lists</a>
        <div id="notificationsWrap" class="account-menu-wrap" hidden>
          <button id="notificationsBtn" class="icon-pill" type="button" aria-label="Notifications" aria-expanded="false">
            <span class="notif-icon" aria-hidden="true">&#128276;</span>
            <span id="notificationsBadge" class="notif-badge" hidden>0</span>
          </button>
          <div id="notificationsMenu" class="account-menu notifications-menu" hidden>
            <div class="notifications-head">
              <strong>Notifications</strong>
            </div>
            <div id="notificationsList" class="notifications-list"></div>
          </div>
        </div>
        <div id="accountMenuWrap" class="account-menu-wrap">
          <button id="toggleAuth" class="pill-btn account-pill" type="button">
            <img id="authAvatarThumb" class="nav-avatar" alt="Selected avatar" />
            <span id="authButtonLabel">Login</span>
          </button>
          <div id="accountMenu" class="account-menu" hidden>
            <button id="openAccountSettings" class="account-menu-item" type="button">Settings</button>
            <a class="account-menu-item" href="./lists.html">My Lists</a>
            <a id="continueWatchingLink" class="account-menu-item" href="./index.html#continueSection">Continue Watching</a>
            <button id="signOutMenuBtn" class="account-menu-item destructive" type="button">Sign Out</button>
          </div>
        </div>
      </div>
    </header>

    <section id="megaMenuPanel" class="mega-menu" hidden>
      <div class="mega-menu-inner">
        <div class="mega-menu-head">
          <h3 id="megaMenuTitle">Genres</h3>
        </div>
        <div id="megaMenuGrid" class="mega-menu-grid"></div>
      </div>
    </section>

    <section id="authModal" class="auth-modal" hidden>
      <div class="auth-backdrop" id="authBackdrop"></div>
      <div class="auth-card" role="dialog" aria-modal="true" aria-labelledby="authTitle">
        <button id="closeAuth" class="auth-close" type="button" aria-label="Close account dialog">x</button>
        <div class="auth-mode-switch" role="tablist" aria-label="Account mode">
          <button id="loginTabBtn" class="auth-mode-btn active" type="button">Sign In</button>
          <button id="signupTabBtn" class="auth-mode-btn" type="button">Create Account</button>
        </div>

        <div id="signedOutView" class="account-grid">
          <div id="authLoginView" class="account-grid">
            <h2 id="authTitle">Sign In</h2>
            <label>
              <span>Username or Email</span>
              <input id="authIdentifier" type="text" placeholder="username or email" />
            </label>
            <label>
              <span>Password</span>
              <input id="authPassword" type="password" placeholder="your password" />
            </label>
            <div class="account-actions">
              <button id="signInBtn" class="pill-btn" type="button">Sign In</button>
            </div>
          </div>

          <div id="authSignupView" class="account-grid" hidden>
            <h2>Create Account</h2>
            <label>
              <span>Username</span>
              <input id="signupUsername" type="text" placeholder="pick a username" />
            </label>
            <label>
              <span>Password</span>
              <input id="signupPassword" type="password" placeholder="create a password" />
            </label>
            <label>
              <span>Confirm Password</span>
              <input id="signupConfirm" type="password" placeholder="re-enter your password" />
            </label>
            <div class="account-actions">
              <button id="signUpBtn" class="pill-btn" type="button">Create Account</button>
            </div>
          </div>

          <p id="authHint" class="tiny muted"></p>
        </div>

        <div id="signedInView" hidden>
          <h2>Account</h2>
          <div class="signed-in-profile">
            <img id="accountAvatar" class="account-avatar" alt="Selected avatar" />
            <div>
              <p class="tiny">Signed in as <strong id="authUserEmail">-</strong></p>
              <p id="signedInHint" class="tiny muted">You are signed in.</p>
            </div>
          </div>
          <div class="account-actions">
            <button id="signOutBtn" class="pill-btn ghost" type="button">Sign Out</button>
          </div>
          <div class="avatar-picker-block compact">
            <div class="row-head compact">
              <h3>Change Avatar</h3>
            </div>
            <div id="signedInAvatarPicker" class="avatar-picker" aria-label="Avatar choices"></div>
          </div>
        </div>
      </div>
    </section>

    <main class="home-shell">
      <section id="heroSection" class="home-hero">
        <div class="hero-shade"></div>
        <div class="hero-copy">
          <p id="heroType" class="tiny">Featured</p>
          <h1 id="heroTitle">Loading...</h1>
          <p id="heroMeta"></p>
          <p id="heroDesc"></p>
          <button id="heroWatchBtn" class="watch-btn" type="button">Watch Now</button>
        </div>
      </section>

      <section id="continueSection" class="home-row" hidden>
        <div class="row-head">
          <h2>Continue Watching</h2>
        </div>
        <div id="continueGrid" class="poster-row"></div>
      </section>

      <section id="searchSection" class="home-row">
        <div class="row-head">
          <h2>Search</h2>
        </div>
        <div class="search-wrap search-wrap-wide">
          <input id="searchInput" class="search-input" type="search" placeholder="Search movies or shows..." autocomplete="off" />
          <div id="searchSuggestions" class="search-suggestions" hidden></div>
        </div>
      </section>

      <section id="searchResultsSection" class="home-row" hidden>
        <div class="row-head compact">
          <h3>Top Results</h3>
        </div>
        <div id="searchResultsGrid" class="poster-row"></div>
      </section>

      <section id="recommendedSection" class="home-row">
        <div class="row-head">
          <h2>Recommended</h2>
        </div>
        <div id="recommendedGrid" class="poster-row"></div>
      </section>

      <section id="trendingSection" class="home-row">
        <div class="row-head">
          <h2>Trending</h2>
        </div>
        <div id="trendingGrid" class="poster-row"></div>
      </section>

      <section id="popularSection" class="home-row">
        <div class="row-head">
          <h2>Popular</h2>
        </div>
        <div id="popularGrid" class="poster-row"></div>
      </section>
    </main>

    <template id="posterCardTemplate">
      <article class="poster-card">
        <button class="poster-btn" type="button">
          <img class="poster-img" alt="" loading="lazy" decoding="async" />
          <span class="badge-hd">HD</span>
          <div class="poster-meta">
            <h4 class="poster-title"></h4>
            <p class="poster-sub"></p>
          </div>
        </button>
      </article>
    </template>

    <script src="config.js"></script>
    <script>
      (function () {
        const isLocalHost = /^(localhost|127\.0\.0\.1|0\.0\.0\.0|\[::1\])$/i.test(location.hostname) || location.hostname.endsWith(".local");
        if (!isLocalHost) {
          return;
        }
        const script = document.createElement("script");
        script.src = "config.local.js";
        script.async = false;
        document.head.appendChild(script);
      })();
    </script>
    <script type="module" src="app.js?v=20260427f"></script>
  </body>
</html>
