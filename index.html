<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinerune</title>
    <meta name="description" content="Cinerune streaming home" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" href="./favicon.svg?v=20260430" type="image/svg+xml" sizes="any">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="home-body">
    <div class="home-atmosphere" aria-hidden="true"></div>

    <header class="home-topbar">
      <a class="home-logo" href="./index.html" aria-label="Go to home"><span>CINE</span>RUNE</a>

      <form id="navSearchForm" class="nav-search" action="./search.html" method="GET">
        <button type="submit" id="navSearchBtn" class="nav-search-btn" aria-label="Search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
        <input type="search" id="navSearchInput" class="nav-search-input" name="q" placeholder="Search..." autocomplete="off" maxlength="80" />
        <div id="searchSuggestions" class="search-suggestions nav-search-suggestions" hidden></div>
      </form>

      <nav class="home-nav" aria-label="Main navigation">
        <a class="chip chip-link" href="./browse.html?mode=genre">Genre</a>
        <a class="chip chip-link" href="./browse.html?mode=country">Countries</a>
        <a class="chip chip-link" href="./top-rated.html?type=movie">Top Rated</a>
      </nav>

      <div class="header-actions">
        <a id="homeListsLink" class="pill-btn ghost" href="./lists.html" hidden>Bookmarks</a>
        <div id="notificationsWrap" class="account-menu-wrap" hidden>
          <button id="notificationsBtn" class="icon-pill" type="button" aria-label="Notifications" aria-expanded="false">
            <span class="notif-icon" aria-hidden="true">&#128276;</span>
            <span id="notificationsBadge" class="notif-badge" hidden>0</span>
          </button>
          <div id="notificationsMenu" class="account-menu notifications-menu" hidden>
            <div class="notifications-head">
              <strong>Notifications</strong>
              <button id="notificationsMarkAll" class="mini-action-btn" type="button">Read</button>
            </div>
            <div id="notificationsList" class="notifications-list"></div>
          </div>
        </div>
        <div id="accountMenuWrap" class="account-menu-wrap">
          <button id="toggleAuth" class="pill-btn account-pill" type="button">
            <img id="authAvatarThumb" class="nav-avatar" alt="Selected avatar" />
            <span id="authButtonLabel">Login</span>
          </button>
          <div id="accountMenu" class="account-menu" hidden>
            <button id="openAccountSettings" class="account-menu-item" type="button">Settings</button>
            <a class="account-menu-item" href="./lists.html">Bookmarks</a>
            <a id="continueWatchingLink" class="account-menu-item" href="./index.html#continueSection">Continue Watching</a>
            <button id="signOutMenuBtn" class="account-menu-item destructive" type="button">Sign Out</button>
          </div>
        </div>
      </div>
    </header>

    <section id="megaMenuPanel" class="mega-menu" hidden>
      <div class="mega-menu-inner">
        <div class="mega-menu-head">
          <h3 id="megaMenuTitle">Genres</h3>
        </div>
        <div id="megaMenuGrid" class="mega-menu-grid"></div>
      </div>
    </section>

    <section id="authModal" class="auth-modal" hidden>
      <div class="auth-backdrop" id="authBackdrop"></div>
      <div class="auth-card" role="dialog" aria-modal="true" aria-labelledby="authTitle">
        <button id="closeAuth" class="auth-close" type="button" aria-label="Close account dialog">x</button>
        <div class="auth-mode-switch" role="tablist" aria-label="Account mode">
          <button id="loginTabBtn" class="auth-mode-btn active" type="button">Sign In</button>
          <button id="signupTabBtn" class="auth-mode-btn" type="button">Create Account</button>
        </div>

        <div id="signedOutView" class="account-grid">
          <div id="authLoginView" class="account-grid">
            <h2 id="authTitle">Sign In</h2>
            <label>
              <span>Username or Email</span>
              <input id="authIdentifier" type="text" placeholder="username or email" maxlength="80" />
            </label>
            <label>
              <span>Password</span>
              <input id="authPassword" type="password" placeholder="your password" maxlength="128" />
            </label>
            <div class="account-actions">
              <button id="signInBtn" class="pill-btn" type="button">Sign In</button>
            </div>
          </div>

          <div id="authSignupView" class="account-grid" hidden>
            <h2>Create Account</h2>
            <label>
              <span>Username</span>
              <input id="signupUsername" type="text" placeholder="pick a username" maxlength="24" />
            </label>
            <label>
              <span>Email <em>optional</em></span>
              <input id="signupEmail" type="email" placeholder="you@example.com" maxlength="80" autocomplete="email" />
            </label>
            <label>
              <span>Password</span>
              <input id="signupPassword" type="password" placeholder="create a password" maxlength="128" />
            </label>
            <label>
              <span>Confirm Password</span>
              <input id="signupConfirm" type="password" placeholder="re-enter your password" maxlength="128" />
            </label>
            <div class="account-actions">
              <button id="signUpBtn" class="pill-btn" type="button">Create Account</button>
            </div>
          </div>

          <p id="authHint" class="tiny muted"></p>
        </div>

        <div id="signedInView" hidden>
          <div class="settings-hero">
            <img id="accountAvatar" class="account-avatar" alt="Selected avatar" />
            <div>
              <p class="settings-kicker">Account Settings</p>
              <h2>Profile and Security</h2>
              <p class="tiny">Signed in as <strong id="authUserEmail">-</strong></p>
              <p id="signedInHint" class="tiny muted">You are signed in.</p>
            </div>
          </div>
          <div class="account-actions">
            <button id="signOutBtn" class="pill-btn ghost" type="button">Sign Out</button>
          </div>

          <div class="settings-action-list">
            <button class="settings-action-toggle" type="button" data-settings-toggle="username" aria-expanded="false">
              <span>
                <strong>Change Username</strong>
                <small>Update the name you use to sign in.</small>
              </span>
              <span class="settings-action-icon" aria-hidden="true">+</span>
            </button>
            <div class="settings-section" data-settings-panel="username" hidden>
              <label>
                <span>New Username</span>
                <input id="settingsUsername" type="text" placeholder="new username" maxlength="24" autocomplete="username" />
              </label>
              <div class="account-actions">
                <button id="saveUsernameBtn" class="pill-btn" type="button">Save Username</button>
              </div>
            </div>

            <button class="settings-action-toggle" type="button" data-settings-toggle="email" aria-expanded="false">
              <span>
                <strong>Add Email</strong>
                <small>Optional login backup if you forget your username.</small>
              </span>
              <span class="settings-action-icon" aria-hidden="true">+</span>
            </button>
            <div class="settings-section" data-settings-panel="email" hidden>
              <label>
                <span>Email Address</span>
                <input id="settingsEmail" type="email" placeholder="you@example.com" maxlength="80" autocomplete="email" />
              </label>
              <div class="account-actions">
                <button id="saveEmailBtn" class="pill-btn" type="button">Save Email</button>
              </div>
            </div>

            <button class="settings-action-toggle" type="button" data-settings-toggle="password" aria-expanded="false">
              <span>
                <strong>Change Password</strong>
                <small>Old password required, new password entered twice.</small>
              </span>
              <span class="settings-action-icon" aria-hidden="true">+</span>
            </button>
            <div class="settings-section" data-settings-panel="password" hidden>
              <label>
                <span>Old Password</span>
                <input id="settingsCurrentPassword" type="password" placeholder="current password" maxlength="128" autocomplete="off" />
              </label>
              <label>
                <span>New Password</span>
                <input id="settingsPassword" type="password" placeholder="new password" maxlength="128" autocomplete="new-password" />
              </label>
              <label>
                <span>Confirm New Password</span>
                <input id="settingsPasswordConfirm" type="password" placeholder="re-enter new password" maxlength="128" autocomplete="new-password" />
              </label>
              <div class="account-actions">
                <button id="savePasswordBtn" class="pill-btn" type="button">Update Password</button>
              </div>
            </div>

            <button class="settings-action-toggle" type="button" data-settings-toggle="avatar" aria-expanded="false">
              <span>
                <strong>Change Avatar</strong>
                <small>Pick a character image for your profile.</small>
              </span>
              <span class="settings-action-icon" aria-hidden="true">+</span>
            </button>
            <div class="avatar-picker-block compact" data-settings-panel="avatar" hidden>
              <div class="row-head compact">
                <h3>Change Avatar</h3>
              </div>
              <div id="signedInAvatarPicker" class="avatar-picker" aria-label="Avatar choices"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <main class="home-shell">
      <section id="heroSection" class="home-hero">
        <div class="hero-shade"></div>
        <div class="hero-copy">
          <p id="heroType" class="tiny">Featured</p>
          <h1 id="heroTitle">Loading...</h1>
          <p id="heroMeta"></p>
          <p id="heroDesc"></p>
          <button id="heroWatchBtn" class="watch-btn" type="button">Watch Now</button>
        </div>
      </section>

      <section id="continueSection" class="home-row" hidden>
        <div class="row-head">
          <h2>Continue Watching</h2>
        </div>
        <div id="continueGrid" class="poster-row"></div>
      </section>

      <section id="searchResultsSection" class="home-row" hidden>
        <div class="row-head compact">
          <h3>Top Results</h3>
        </div>
        <div id="searchResultsGrid" class="poster-row"></div>
        <div id="searchPagination" class="pager" hidden></div>
      </section>

      <section id="recommendedSection" class="home-row">
        <div class="row-head">
          <h2>Recommended</h2>
        </div>
        <div id="recommendedGrid" class="poster-row"></div>
      </section>

      <section id="trendingSection" class="home-row">
        <div class="row-head">
          <h2>Trending</h2>
        </div>
        <div id="trendingGrid" class="poster-row"></div>
      </section>

      <section id="popularSection" class="home-row">
        <div class="row-head">
          <h2>Popular</h2>
        </div>
        <div id="popularGrid" class="poster-row"></div>
      </section>
    </main>

    <template id="posterCardTemplate">
      <article class="poster-card">
        <button class="poster-btn" type="button">
          <img class="poster-img" alt="" loading="lazy" decoding="async" />
          <span class="badge-hd">HD</span>
          <div class="poster-meta">
            <h4 class="poster-title"></h4>
            <p class="poster-sub"></p>
          </div>
        </button>
      </article>
    </template>

    <script src="config.js"></script>
    <script>
      (function () {
        const isLocalHost = /^(localhost|127\.0\.0\.1|0\.0\.0\.0|\[::1\])$/i.test(location.hostname) || location.hostname.endsWith(".local");
        if (!isLocalHost) {
          return;
        }
        const script = document.createElement("script");
        script.src = "config.local.js";
        script.async = false;
        document.head.appendChild(script);
      })();
    </script>
    <script type="module" src="app.js?v=20260501-stable"></script>
  </body>
</html>
