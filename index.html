<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinerune</title>
    <meta name="description" content="Cinerune streaming home" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="home-body">
    <div class="home-atmosphere" aria-hidden="true"></div>

    <header class="home-topbar">
      <a class="home-logo" href="./index.html" aria-label="Go to home"><span>CINE</span>RUNE</a>

      <nav class="home-nav" aria-label="Main navigation">
        <a href="#continueSection">Continue Watching</a>
        <a href="#recommendedSection">Recommended</a>
        <a href="#latestMoviesSection">Latest Movies</a>
      </nav>

      <button id="toggleAuth" class="pill-btn" type="button">Account</button>
    </header>

    <section class="account-panel" id="authPanel" hidden>
      <div class="account-grid" id="signedOutView">
        <h2>Account</h2>
        <label>
          <span>Username or Email</span>
          <input id="authIdentifier" type="text" placeholder="username or email" />
        </label>
        <label>
          <span>Password</span>
          <input id="authPassword" type="password" placeholder="password" />
        </label>
        <div class="account-actions">
          <button id="signInBtn" class="pill-btn" type="button">Sign In</button>
          <button id="signUpBtn" class="pill-btn ghost" type="button">Create Account</button>
        </div>
        <p id="authHint" class="tiny muted">Set Supabase values in config.js to enable sync.</p>
      </div>

      <div id="signedInView" hidden>
        <p class="tiny">Signed in as <strong id="authUserEmail">-</strong></p>
        <div class="account-actions">
          <button id="syncNowBtn" class="pill-btn" type="button">Sync Now</button>
          <button id="signOutBtn" class="pill-btn ghost" type="button">Sign Out</button>
        </div>

        <section class="folder-section">
          <h3>My Lists</h3>
          <div class="folder-grid">
            <article class="folder-card">
              <h4>Watching</h4>
              <div id="folderWatching" class="folder-list"></div>
            </article>
            <article class="folder-card">
              <h4>Watched</h4>
              <div id="folderWatched" class="folder-list"></div>
            </article>
            <article class="folder-card">
              <h4>Plan to Watch</h4>
              <div id="folderPlan" class="folder-list"></div>
            </article>
            <article class="folder-card">
              <h4>Dropped</h4>
              <div id="folderDropped" class="folder-list"></div>
            </article>
          </div>
        </section>
      </div>
    </section>

    <main class="home-shell">
      <section id="heroSection" class="home-hero">
        <div class="hero-shade"></div>
        <div class="hero-copy">
          <p id="heroType" class="tiny">Featured</p>
          <h1 id="heroTitle">Loading...</h1>
          <p id="heroMeta"></p>
          <p id="heroDesc"></p>
          <button id="heroWatchBtn" class="watch-btn" type="button">Watch Now</button>
        </div>
      </section>

      <section id="continueSection" class="home-row" hidden>
        <div class="row-head">
          <h2>Continue Watching</h2>
        </div>
        <div id="continueGrid" class="poster-row"></div>
      </section>

      <section id="recommendedSection" class="home-row">
        <div class="row-head">
          <h2>Recommended</h2>
          <div class="filter-chips">
            <button id="showRecommendedAll" class="chip active" type="button">All</button>
            <button id="showRecommendedMovies" class="chip" type="button">Movies</button>
            <button id="showRecommendedTv" class="chip" type="button">TV Series</button>
          </div>
        </div>
        <div id="recommendedGrid" class="poster-grid"></div>
      </section>

      <section id="latestMoviesSection" class="home-row">
        <div class="row-head">
          <h2>Latest Movies</h2>
          <input id="searchInput" class="search-input" type="search" placeholder="Search titles..." />
        </div>
        <div id="latestMoviesGrid" class="poster-row"></div>
      </section>

      <p id="statusLine" class="tiny muted">Loading library...</p>
      <p id="cloudState" class="tiny muted">Cloud sync: off</p>
    </main>

    <template id="posterCardTemplate">
      <article class="poster-card">
        <button class="poster-btn" type="button">
          <img class="poster-img" alt="" loading="lazy" decoding="async" />
          <span class="badge-hd">HD</span>
          <div class="poster-meta">
            <h4 class="poster-title"></h4>
            <p class="poster-sub"></p>
          </div>
        </button>
      </article>
    </template>

    <script src="config.js"></script>
    <script src="config.local.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
