<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watch | Cinerune</title>
    <meta name="description" content="Cinerune watch page" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" href="./favicon.svg?v=20260430" type="image/svg+xml" sizes="any">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="watch-body">
    <div class="watch-atmosphere" aria-hidden="true"></div>

    <header class="watch-topbar">
      <a class="home-logo" href="./index.html" aria-label="Go to home"><span>CINE</span>RUNE</a>
      <form class="nav-search" action="./search.html" method="GET">
        <button type="submit" class="nav-search-btn" aria-label="Search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
        <input type="search" class="nav-search-input" name="q" placeholder="Search..." autocomplete="off" maxlength="80" />
      </form>
      <nav class="watch-nav">
        <a class="chip chip-link" href="./browse.html?mode=genre">Genre</a>
        <a class="chip chip-link" href="./browse.html?mode=country">Countries</a>
        <a class="chip chip-link" href="./top-rated.html?type=movie">Top Rated</a>
      </nav>
      <div class="watch-top-actions">
        <a id="watchListsLink" class="pill-btn ghost" href="./lists.html" hidden>Bookmarks</a>
        <div id="watchAccountMenuWrap" class="account-menu-wrap">
          <button id="watchAccountBtn" class="pill-btn account-pill" type="button">
            <img id="watchAccountAvatar" class="nav-avatar" alt="Selected avatar" />
            <span id="watchAccountLabel">Login</span>
          </button>
          <div id="watchAccountMenu" class="account-menu" hidden>
            <button id="watchAccountSettings" class="account-menu-item" type="button">Settings</button>
            <a class="account-menu-item" href="./lists.html">Bookmarks</a>
            <a class="account-menu-item" href="./lists.html?view=continue">Continue Watching</a>
            <button id="watchSignOutBtn" class="account-menu-item destructive" type="button">Sign Out</button>
          </div>
        </div>
      </div>
    </header>

    <main class="watch-shell">
      <section class="watch-main-card">
        <div class="player-shell">
          <iframe
            id="playerFrame"
            title="Cinerune Player"
            loading="eager"
            referrerpolicy="origin"
            allow="autoplay; encrypted-media; picture-in-picture"
            allowfullscreen
          ></iframe>
        </div>

        <div class="player-controls">
          <div class="left-controls">
            <button id="prevEpisodeBtn" class="control-btn" type="button">Prev</button>
            <button id="nextEpisodeBtn" class="control-btn" type="button">Next</button>
          </div>

          <div class="right-controls">
            <div class="dropdown" id="bookmarkDropdown">
              <button id="bookmarkTrigger" class="control-btn" type="button">Bookmark</button>
              <span id="bookmarkToast" class="bookmark-toast" hidden></span>
              <div id="bookmarkMenu" class="dropdown-menu" hidden>
                <button class="bookmark-option" data-status="watching" type="button">Watching</button>
                <button class="bookmark-option" data-status="watched" type="button">Watched</button>
                <button class="bookmark-option" data-status="plan" type="button">Plan to Watch</button>
                <button class="bookmark-option" data-status="dropped" type="button">Dropped</button>
                <button class="bookmark-option bookmark-clear" data-status="clear" type="button">Remove Bookmark</button>
              </div>
            </div>
            <button id="reportTrigger" class="control-btn" type="button">Report</button>
          </div>
        </div>

        <p id="watchStatus" class="tiny muted"></p>

        <section id="tvControls" class="season-block" hidden>
          <div class="row-head compact">
            <h3>Season</h3>
            <select id="seasonSelect"></select>
          </div>
          <p id="episodeCountText" class="tiny muted"></p>
          <div id="episodeGrid" class="episode-grid"></div>
        </section>

        <section class="home-row related-row">
          <div class="row-head">
            <h2>You may also like</h2>
            <div>
              <button id="relatedPrevBtn" class="arrow-btn" type="button">&#8592;</button>
              <button id="relatedNextBtn" class="arrow-btn" type="button">&#8594;</button>
            </div>
          </div>
          <div id="relatedRail" class="poster-row"></div>
        </section>
      </section>

      <aside class="watch-side-card">
        <img id="sidePoster" class="side-poster" alt="Poster" loading="lazy" decoding="async" />
        <p id="watchTagline" class="tiny muted"></p>
        <h2 id="watchTitle">Loading...</h2>
        <div id="watchMeta" class="watch-badges"></div>
        <p id="sidePlot" class="tiny muted"></p>
        <p id="sideType" class="tiny muted"></p>
        <p id="sideGenre" class="tiny muted"></p>
        <p id="sideRuntime" class="tiny muted"></p>
        <p id="sideProgress" class="tiny muted"></p>
        <div class="rating-block">
          <p class="stars" id="ratingStars">☆☆☆☆☆</p>
          <p id="sideRating" class="tiny"></p>
        </div>
      </aside>
    </main>

    <dialog id="reportDialog" class="report-dialog">
      <form id="reportForm" method="dialog">
        <h3>Send Report</h3>
        <p class="tiny muted">Tell us what is wrong with this title or stream.</p>
        <textarea id="reportMessage" rows="4" placeholder="Describe the issue"></textarea>
        <div class="account-actions">
          <button id="cancelReport" class="pill-btn ghost" value="cancel" type="button">Cancel</button>
          <button class="pill-btn" value="submit" type="submit">Send Report</button>
        </div>
      </form>
    </dialog>

    <script src="config.js"></script>
    <script>
      (function () {
        const isLocalHost = /^(localhost|127\.0\.0\.1|0\.0\.0\.0|\[::1\])$/i.test(location.hostname) || location.hostname.endsWith(".local");
        if (!isLocalHost) {
          return;
        }
        const script = document.createElement("script");
        script.src = "config.local.js";
        script.async = false;
        document.head.appendChild(script);
      })();
    </script>
    <script type="module" src="watch.js?v=20260501-fallback"></script>
  </body>
</html>
