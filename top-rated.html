  <body class="home-body">
    <div class="home-atmosphere" aria-hidden="true"></div>

    <header class="home-topbar">
      <a class="home-logo" href="./index.html" aria-label="Go to home"><span>CINE</span>RUNE</a>
      <nav class="home-nav" aria-label="Top rated navigation">
        <a href="./index.html">Home</a>

        <div class="row-head">

          <div class="filter-chips">
            <a id="topRatedMoviesLink" class="explorer-chip" href="./top-rated.html?type=movie">Movies</a>

          </div>

    <script src="config.js"></script>
    <script>
      (function () {
        const isLocalHost = /^(localhost|127\.0\.0\.1|0\.0\.0\.0|\[::1\])$/i.test(location.hostname) || location.hostname.endsWith(".local");
        if (!isLocalHost) {
          return;
        }
        const script = document.createElement("script");
        script.src = "config.local.js";
        script.async = false;
        document.head.appendChild(script);
